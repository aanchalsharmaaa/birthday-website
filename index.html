<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 🎉</title>

<style>

body{
text-align:center;
background:linear-gradient(pink,purple);
font-family:Arial;
color:white;
overflow:hidden;
margin-top:120px;
}

h1{
font-size:50px;
}

.balloon{
position:absolute;
font-size:40px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{top:100%;}
100%{top:-10%;}
}

.confetti{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{top:-10%;}
100%{top:100%;}
}
button{
    height:50px;
    border-radius:10px;
    background-color: brown;
    color:white;
    
}
</style>
</head>

<body>
<!-- <audio autoplay loop>
<source src="Dooron.mp3" type="audio/mpeg">
</audio> -->
<h1>🎉 Surprise Nonu 🎉</h1>

<h2>Happy Birthday 💖</h2>
<a href="page1.html"><button>🎂 Cut the cake</button></a>
<a href="page2.html"><button>🎉 Some Sweet Moments</button></a>
<a href="page3.html"><button>💖 Special Message</button></a>
<a href="final.html"><button>✨ Final Wish</button></a>

<p>May your life be full of happiness and smiles ✨</p>

<!-- <audio id="music" loop>
<source src="Dooron.mp3" type="audio/mpeg">
</audio> -->
<audio id="music" loop>
  <source src="Dooron.mp3" type="audio/mpeg">
</audio>
<script>

// start music on click
document.body.addEventListener("click", function(){
document.getElementById("music").play();
});

// balloons
for(let i=0;i<15;i++){

let b=document.createElement("div");

b.innerHTML="🎈";

b.className="balloon";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(Math.random()*4+3)+"s";

document.body.appendChild(b);

}

// confetti
for(let i=0;i<25;i++){

let c=document.createElement("div");

c.innerHTML="🎉";

c.className="confetti";

c.style.left=Math.random()*100+"%";

c.style.animationDuration=(Math.random()*3+2)+"s";

document.body.appendChild(c);

}

</script>

</body>
</html>
