<style>

body{
text-align:center;
background:linear-gradient(pink,purple);
font-family:Arial;
color:white;
overflow:hidden;
margin-top:120px;
}

h1{
font-size:50px;
}

.balloon{
position:absolute;
font-size:40px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{top:100%;}
100%{top:-10%;}
}

.confetti{
position:absolute;
font-size:25px;
animation:fall 3s linear infinite;
}

@keyframes fall{
0%{top:-10%;}
100%{top:100%;}
}

</style>
</head>
